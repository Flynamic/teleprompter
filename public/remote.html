<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4f0e7">
    <title>Teleprompter Remote</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="remote-screen">
    <main class="remote-shell">
      <header class="remote-header">
        <div>
          <p class="eyebrow">Remote</p>
          <h1>Leanders Teleprompter</h1>
        </div>
        <div class="connection" id="connection">offline</div>
      </header>

      <section class="control-strip">
        <button class="primary-button" id="playPause" type="button">Start</button>
        <button class="secondary-button" id="topButton" type="button">Anfang</button>
        <label class="token-field">
          <span>Token</span>
          <input id="tokenInput" type="password" autocomplete="off" placeholder="Control Token">
        </label>
      </section>

      <section class="sliders">
        <label>
          <span>Position</span>
          <input id="positionInput" type="range" min="0" max="1000" value="0">
        </label>
        <label>
          <span>Tempo</span>
          <input id="speedInput" type="range" min="1" max="180" value="34">
        </label>
        <label>
          <span>Schrift</span>
          <input id="fontInput" type="range" min="36" max="140" value="72">
        </label>
      </section>

      <section class="toggles">
        <label>
          <input id="mirrorInput" type="checkbox">
          <span>Spiegelmodus</span>
        </label>
      </section>

      <section class="live-pane">
        <div class="screen-preview" id="screenPreview">
          <div class="screen-marker"></div>
          <div class="screen-text" id="screenText"></div>
        </div>
        <div class="position-readout" id="positionReadout">0%</div>
      </section>

      <section class="editor-pane">
        <textarea id="textInput" spellcheck="true"></textarea>
      </section>
    </main>
    <script src="/shared.js"></script>
    <script src="/remote.js"></script>
  </body>
</html>
